# =============================================================================
# Node.js PR Validation Workflow
# =============================================================================
# Runs build, tests, and security audit on pull requests to main branch
# =============================================================================

name: 🔍 PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: 🧪 Build & Test
    uses: bauer-group/automation-templates/.github/workflows/nodejs-build.yml@main
    with:
      node-version: '24.x'
      package-manager: 'npm'
      frozen-lockfile: true
      build-command: 'npm run build'
      run-tests: true
      test-coverage: true
      coverage-threshold: 80
      # Audit only production deps — devDependencies (n8n-core, n8n-workflow)
      # carry transitive vulnerabilities from upstream n8n that we cannot fix.
      run-audit: true
      audit-level: 'critical'
      audit-production-only: true
      upload-artifacts: false
    secrets: inherit
